# Preview Build — manual TestFlight deployment
#
# Required repository secrets:
#   CERTIFICATE_P12            — base64-encoded Apple Distribution certificate (.p12)
#   CERTIFICATE_PASSWORD       — password for the .p12 certificate
#   PROVISIONING_PROFILE       — base64-encoded App Store provisioning profile (.mobileprovision)
#   PROVISIONING_PROFILE_NAME  — profile name as it appears in Xcode
#   TEAM_ID                    — Apple Developer Team ID
#   ASC_KEY_ID                 — App Store Connect API Key ID
#   ASC_ISSUER_ID              — App Store Connect Issuer ID
#   ASC_API_KEY                — base64-encoded App Store Connect API key (.p8)

name: Preview Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or ref to build'
        required: false
        default: ''

concurrency:
  group: preview-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - name: Validate secrets
        run: |
          missing=()
          [ -z "${{ secrets.CERTIFICATE_P12 }}" ] && missing+=("CERTIFICATE_P12")
          [ -z "${{ secrets.CERTIFICATE_PASSWORD }}" ] && missing+=("CERTIFICATE_PASSWORD")
          [ -z "${{ secrets.PROVISIONING_PROFILE }}" ] && missing+=("PROVISIONING_PROFILE")
          [ -z "${{ secrets.PROVISIONING_PROFILE_NAME }}" ] && missing+=("PROVISIONING_PROFILE_NAME")
          [ -z "${{ secrets.TEAM_ID }}" ] && missing+=("TEAM_ID")
          [ -z "${{ secrets.ASC_KEY_ID }}" ] && missing+=("ASC_KEY_ID")
          [ -z "${{ secrets.ASC_ISSUER_ID }}" ] && missing+=("ASC_ISSUER_ID")
          [ -z "${{ secrets.ASC_API_KEY }}" ] && missing+=("ASC_API_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/xcodegen
            /opt/homebrew/Cellar/xcbeautify
          key: brew-${{ runner.os }}-xcodegen-xcbeautify

      - name: Install tools
        run: |
          brew install xcodegen xcbeautify || true
          brew link --overwrite xcodegen xcbeautify || true

      - name: Install signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"

          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_DIR/build.mobileprovision"

      - name: Configure CI environment
        run: |
          cat > project.local.yml << EOF
          settings:
            base:
              DEVELOPMENT_TEAM: ${{ secrets.TEAM_ID }}
              PRODUCT_BUNDLE_IDENTIFIER_MURMUR: com.damsac.murmur
              PRODUCT_BUNDLE_IDENTIFIER_TESTS: com.damsac.murmur.tests
              APP_GROUP_IDENTIFIER: group.com.damsac.murmur.shared
              PPQ_API_KEY: ""
          EOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -scheme Murmur \
            -archivePath "$RUNNER_TEMP/Murmur.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            2>&1 | xcbeautify

      - name: Prepare ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          sed \
            -e "s/\${TEAM_ID}/$TEAM_ID/g" \
            -e "s/\${PROVISIONING_PROFILE_NAME}/$PROVISIONING_PROFILE_NAME/g" \
            .github/ExportOptions.plist > "$RUNNER_TEMP/ExportOptions.plist"

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Murmur.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            2>&1 | xcbeautify

      - name: Install App Store Connect API key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          KEY_DIR="$HOME/.private_keys"
          mkdir -p "$KEY_DIR"
          echo "$ASC_API_KEY" | base64 --decode > "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/Murmur.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Cleanup signing materials
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -rf "$HOME/Library/MobileDevice/Provisioning Profiles/build.mobileprovision"
          rm -rf "$HOME/.private_keys"
